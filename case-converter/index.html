<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter - English 1 Batam</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'e1-pink': '#FF6B95',
                        'e1-orange': '#FF8C42',
                        'e1-green': '#00E676',
                        'e1-blue': '#2979FF',
                        'e1-dark': '#1e293b',
                        'e1-chalk': '#f8fafc',
                    },
                    fontFamily: {
                        headings: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-lg': '8px 8px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
                    },
                    borderWidth: { '3': '3px', '4': '4px' }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .dark body {
            background-color: #0f172a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        .btn-action {
            transition: all 0.1s ease;
        }
        .btn-action:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
        }
        .btn-action:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
        }
        
        /* Chunky Scrollbar */
        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: transparent; border-left: 3px solid #1e293b; }
        ::-webkit-scrollbar-thumb { background: #2979FF; border: 3px solid #1e293b; border-radius: 12px; }
    </style>
</head>

<body class="font-body text-e1-dark min-h-screen flex flex-col p-6 max-w-7xl mx-auto w-full">

    <nav class="w-full bg-white border-4 border-e1-dark p-4 rounded-2xl shadow-neo mb-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="bg-e1-dark text-white p-2 rounded-xl hover:bg-slate-700 transition" aria-label="Go Back">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <h1 class="font-headings text-2xl font-bold">Case <span class="text-e1-blue underline decoration-4 underline-offset-4">Converter</span></h1>
        </div>
        <div class="hidden md:flex gap-2">
            <span class="bg-e1-blue/10 text-e1-blue px-3 py-1 rounded-lg font-bold text-sm border-2 border-e1-blue">Text Tool</span>
            <span class="bg-e1-orange/10 text-e1-orange px-3 py-1 rounded-lg font-bold text-sm border-2 border-e1-orange">Utility</span>
        </div>
    </nav>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-grow">
        
        <div class="flex flex-col gap-4">
            <div class="flex justify-between items-end">
                <label class="font-headings font-bold text-xl flex items-center gap-2">
                    <i data-lucide="file-input" class="text-e1-blue"></i>
                    Input Text
                </label>
                <button onclick="clearInput()" class="text-sm font-bold text-slate-400 hover:text-red-500 transition">Clear</button>
            </div>
            
            <textarea id="inputText" 
                class="w-full h-64 lg:h-full bg-white border-4 border-e1-dark rounded-2xl p-6 font-body text-lg shadow-neo focus:ring-4 focus:ring-e1-blue/20 outline-none resize-none placeholder-slate-400"
                placeholder="Type or paste your text here..."></textarea>
            
            <div class="flex gap-4 text-sm font-bold text-slate-500 px-2">
                <span id="charCount">0 characters</span>
                <span id="wordCount">0 words</span>
            </div>
        </div>

        <div class="flex flex-col gap-6">
            
            <div class="bg-white border-4 border-e1-dark rounded-2xl p-6 shadow-neo">
                <h3 class="font-headings font-bold text-sm uppercase text-slate-400 mb-3 tracking-wider">Convert To</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="convertText('upper')" class="btn-action bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-pink hover:text-white group">
                        <i data-lucide="arrow-up-az" class="w-5 h-5 text-e1-pink group-hover:text-white"></i>
                        <span>UPPERCASE</span>
                    </button>

                    <button onclick="convertText('lower')" class="btn-action bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-orange hover:text-white group">
                        <i data-lucide="arrow-down-az" class="w-5 h-5 text-e1-orange group-hover:text-white"></i>
                        <span>lowercase</span>
                    </button>

                    <button onclick="convertText('title')" class="btn-action bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-green hover:text-white group">
                        <i data-lucide="heading" class="w-5 h-5 text-e1-green group-hover:text-white"></i>
                        <span>Title Case</span>
                    </button>

                    <button onclick="convertText('sentence')" class="btn-action bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-blue hover:text-white group">
                        <i data-lucide="text-quote" class="w-5 h-5 text-e1-blue group-hover:text-white"></i>
                        <span>Sentence case</span>
                    </button>

                    <button onclick="convertText('camel')" class="btn-action bg-slate-100 border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-dark hover:text-white group">
                        <i data-lucide="wrap-text" class="w-5 h-5 text-slate-500 group-hover:text-white"></i>
                        <span>camelCase</span>
                    </button>

                    <button onclick="convertText('snake')" class="btn-action bg-slate-100 border-3 border-e1-dark rounded-xl p-3 font-bold text-left flex items-center gap-3 hover:bg-e1-dark hover:text-white group">
                        <i data-lucide="separator-horizontal" class="w-5 h-5 text-slate-500 group-hover:text-white"></i>
                        <span>snake_case</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-2 flex-grow">
                <label class="font-headings font-bold text-xl flex items-center gap-2">
                    <i data-lucide="file-output" class="text-e1-green"></i>
                    Result
                </label>
                <div class="relative flex-grow">
                    <textarea id="outputText" readonly
                        class="w-full h-full min-h-[150px] bg-slate-50 border-4 border-e1-dark rounded-2xl p-6 font-body text-lg shadow-neo outline-none resize-none text-slate-700"></textarea>
                    
                    <button onclick="copyToClipboard()" class="absolute top-4 right-4 bg-e1-dark text-white p-2 rounded-xl border-2 border-white shadow-lg hover:bg-e1-blue transition-colors group" aria-label="Copy to Clipboard">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');

        // Live Counter Logic
        inputEl.addEventListener('input', () => {
            const text = inputEl.value;
            charCountEl.innerText = `${text.length} characters`;
            
            const words = text.trim().split(/\s+/);
            const wordCount = text.trim() === '' ? 0 : words.length;
            wordCountEl.innerText = `${wordCount} words`;
            
            // Auto-update output if there's already converted text and a mode is selected
            if (window.currentMode && text.trim() !== '') {
                convertText(window.currentMode);
            } else if (text.trim() === '') {
                outputEl.value = '';
            }
        });

        // Conversion Logic
        function convertText(type) {
            window.currentMode = type; // Save mode for live updates
            let text = inputEl.value;

            if (!text.trim()) return;

            switch(type) {
                case 'upper':
                    text = text.toUpperCase();
                    break;
                case 'lower':
                    text = text.toLowerCase();
                    break;
                case 'title':
                    text = text.toLowerCase().replace(/(?:^|\s|-)\S/g, function(match) {
                        return match.toUpperCase();
                    });
                    break;
                case 'sentence':
                    text = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'camel':
                    text = text.replace(/(?:^\w|[A-Z]|\b\w)/g, (word, index) => {
                        return index === 0 ? word.toLowerCase() : word.toUpperCase();
                    }).replace(/\s+/g, '');
                    break;
                case 'snake':
                    text = text.match(/[A-Z]{2,}(?=[A-Z][a-z]+[0-9]*|\b)|[A-Z]?[a-z]+[0-9]*|[A-Z]|[0-9]+/g)
                        ?.map(x => x.toLowerCase())
                        .join('_') || text.toLowerCase().replace(/\s+/g, '_');
                    break;
            }

            outputEl.value = text;
        }

        // Utility Functions
        function clearInput() {
            inputEl.value = '';
            outputEl.value = '';
            window.currentMode = null;
            inputEl.dispatchEvent(new Event('input')); // Trigger counters update
            inputEl.focus();
        }

        function copyToClipboard() {
            if (!outputEl.value) return;
            
            outputEl.select();
            document.execCommand('copy');
            
            // Visual feedback
            const btn = document.querySelector('button[onclick="copyToClipboard()"]');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-e1-green"></i>`;
            lucide.createIcons();
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }, 1500);
        }
    </script>
</body>
</html>
