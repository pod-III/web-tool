<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic List Converter - English 1 Batam</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'e1-pink': '#FF6B95',
                        'e1-orange': '#FF8C42',
                        'e1-green': '#00E676',
                        'e1-blue': '#2979FF',
                        'e1-dark': '#1e293b',
                        'e1-chalk': '#f8fafc',
                    },
                    fontFamily: {
                        headings: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-hover': '6px 6px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-focus': '0px 0px 0px 4px rgba(41, 121, 255, 0.3), 4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-focus-green': '0px 0px 0px 4px rgba(0, 230, 118, 0.3), 4px 4px 0px 0px rgba(30, 41, 59, 1)'
                    },
                    borderWidth: { '3': '3px', '4': '4px' }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        
        /* Interactive button physics */
        .btn-neo {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-neo:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
        }
        .btn-neo:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
        }
        .btn-neo:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        /* Chunky Scrollbar */
        ::-webkit-scrollbar { width: 14px; }
        ::-webkit-scrollbar-track { background: transparent; border-left: 3px solid #1e293b; }
        ::-webkit-scrollbar-thumb { background: #00E676; border: 3px solid #1e293b; border-radius: 12px; }
    </style>
</head>

<body class="font-body text-e1-dark min-h-screen flex flex-col p-4 md:p-6 lg:p-8 max-w-[1400px] mx-auto w-full">

    <header class="w-full bg-white border-4 border-e1-dark p-4 md:p-5 rounded-2xl shadow-neo mb-8 flex flex-col md:flex-row gap-4 justify-between items-center z-10 relative">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <a href="../index.html" class="bg-e1-dark text-white p-2.5 rounded-xl border-2 border-transparent hover:border-white hover:-translate-y-1 hover:shadow-neo transition-all group shrink-0" aria-label="Go Back">
                <i data-lucide="arrow-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
            </a>
            <div>
                <h1 class="font-headings text-2xl md:text-3xl font-bold tracking-wide">Magic <span class="text-e1-green underline decoration-4 underline-offset-4">List</span></h1>
                <p class="font-body text-sm font-bold text-slate-500 mt-1">Transform messy text into clean data</p>
            </div>
        </div>
        <div class="flex gap-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 hide-scrollbar">
            <span class="bg-e1-blue/10 text-e1-blue border-2 border-e1-blue px-3 py-1.5 rounded-lg font-headings font-semibold text-sm whitespace-nowrap"><i data-lucide="hash" class="w-4 h-4 inline-block mr-1 -mt-0.5"></i> Data</span>
            <span class="bg-e1-green/10 text-e1-green border-2 border-e1-green px-3 py-1.5 rounded-lg font-headings font-semibold text-sm whitespace-nowrap"><i data-lucide="list-ordered" class="w-4 h-4 inline-block mr-1 -mt-0.5"></i> Formatting</span>
        </div>
    </header>

    <main class="grid grid-cols-1 xl:grid-cols-12 gap-8 flex-grow">
        
        <div class="xl:col-span-4 flex flex-col gap-4 h-[400px] xl:h-auto">
            <div class="flex justify-between items-end px-1">
                <label for="inputText" class="font-headings font-bold text-xl flex items-center gap-2">
                    <i data-lucide="keyboard" class="text-e1-blue w-6 h-6"></i> Input Data
                </label>
                <button onclick="clearAll()" class="text-sm font-bold text-slate-400 hover:text-e1-pink transition-colors flex items-center gap-1">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear
                </button>
            </div>
            
            <div class="relative flex-grow flex flex-col bg-white border-4 border-e1-dark rounded-2xl shadow-neo focus-within:shadow-neo-focus transition-shadow duration-200">
                <textarea id="inputText" 
                    class="w-full flex-grow p-5 font-body text-lg outline-none resize-none bg-transparent placeholder-slate-400 rounded-t-xl"
                    placeholder="Paste a paragraph, comma-separated list, or rough notes here..."></textarea>
                
                <div class="bg-slate-50 border-t-3 border-e1-dark px-4 py-3 rounded-b-xl flex justify-between items-center text-sm font-bold text-slate-500">
                    <span id="inputLines">0 Lines</span>
                    <span id="inputWords">0 Words</span>
                    <span id="inputChars">0 Chars</span>
                </div>
            </div>
        </div>

        <div class="xl:col-span-4 flex flex-col gap-6">
            
            <div class="bg-white border-4 border-e1-dark rounded-2xl p-5 shadow-neo">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-e1-orange/20 border-2 border-e1-orange flex items-center justify-center">
                        <i data-lucide="braces" class="w-4 h-4 text-e1-orange"></i>
                    </div>
                    <h3 class="font-headings font-bold text-lg text-e1-dark">Data Parsing</h3>
                </div>
                
                <div class="space-y-3">
                    <button onclick="process('paragraphToCsv')" class="w-full btn-neo bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 flex items-center group">
                        <div class="bg-e1-orange text-white p-2 rounded-lg border-2 border-e1-dark group-hover:scale-110 transition-transform">
                            <i data-lucide="text" class="w-5 h-5"></i>
                        </div>
                        <div class="ml-3 text-left">
                            <span class="block font-headings font-bold text-lg leading-none">Paragraph &rarr; CSV</span>
                            <span class="block font-body font-semibold text-xs text-slate-500 mt-1">Sentences to lines, words to commas</span>
                        </div>
                    </button>

                    <button onclick="process('linesToComma')" class="w-full btn-neo bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 flex items-center group">
                        <div class="bg-e1-blue text-white p-2 rounded-lg border-2 border-e1-dark group-hover:scale-110 transition-transform">
                            <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                        </div>
                        <div class="ml-3 text-left">
                            <span class="block font-headings font-bold text-lg leading-none">Lines &rarr; CSV</span>
                            <span class="block font-body font-semibold text-xs text-slate-500 mt-1">Merges vertical list into one line</span>
                        </div>
                    </button>
                    
                    <button onclick="process('commaToLines')" class="w-full btn-neo bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 flex items-center group">
                        <div class="bg-e1-pink text-white p-2 rounded-lg border-2 border-e1-dark group-hover:scale-110 transition-transform">
                            <i data-lucide="wrap-text" class="w-5 h-5"></i>
                        </div>
                        <div class="ml-3 text-left">
                            <span class="block font-headings font-bold text-lg leading-none">Comma &rarr; Lines</span>
                            <span class="block font-body font-semibold text-xs text-slate-500 mt-1">Breaks CSV into vertical data</span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="bg-white border-4 border-e1-dark rounded-2xl p-5 shadow-neo">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-e1-green/20 border-2 border-e1-green flex items-center justify-center">
                        <i data-lucide="list-checks" class="w-4 h-4 text-e1-green"></i>
                    </div>
                    <h3 class="font-headings font-bold text-lg text-e1-dark">List Generation</h3>
                </div>
                
                <div class="space-y-3">
                    <button onclick="process('commaToList')" class="w-full btn-neo bg-e1-chalk border-3 border-e1-dark rounded-xl p-3 flex items-center group">
                        <div class="bg-e1-dark text-white p-2 rounded-lg border-2 border-transparent group-hover:scale-110 transition-transform">
                            <i data-lucide="list" class="w-5 h-5"></i>
                        </div>
                        <div class="ml-3 text-left">
                            <span class="block font-headings font-bold text-lg leading-none">Bullet List</span>
                            <span class="block font-body font-semibold text-xs text-slate-500 mt-1">Creates a standard dot list</span>
                        </div>
                    </button>

                    <div class="flex bg-e1-chalk border-3 border-e1-dark rounded-xl overflow-hidden focus-within:ring-2 ring-e1-green shadow-[2px_2px_0px_0px_rgba(30,41,59,1)]">
                        <button onclick="process('commaToOrdered')" class="flex-grow p-3 flex items-center hover:bg-slate-200 transition-colors text-left border-r-3 border-e1-dark">
                            <div class="bg-e1-dark text-white p-2 rounded-lg border-2 border-transparent">
                                <i data-lucide="list-ordered" class="w-5 h-5"></i>
                            </div>
                            <div class="ml-3">
                                <span class="block font-headings font-bold text-lg leading-none">Numbered List</span>
                            </div>
                        </button>
                        <select id="numOpt" class="bg-white p-3 font-headings font-bold text-lg outline-none cursor-pointer w-24 text-center hover:bg-slate-50">
                            <option value="dot">1.</option>
                            <option value="paren">1)</option>
                            <option value="alpha">a.</option>
                            <option value="roman">I.</option>
                        </select>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="xl:col-span-4 flex flex-col gap-4 h-[400px] xl:h-auto">
            <div class="flex justify-between items-end px-1">
                <label for="outputText" class="font-headings font-bold text-xl flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-e1-green w-6 h-6"></i> Result
                </label>
                <span id="outputState" class="text-sm font-bold text-slate-400 italic">Waiting for action...</span>
            </div>
            
            <div class="relative flex-grow flex flex-col bg-slate-50 border-4 border-e1-dark rounded-2xl shadow-neo focus-within:shadow-neo-focus-green transition-shadow duration-200">
                <textarea id="outputText" readonly
                    class="w-full flex-grow p-5 font-body text-lg outline-none resize-none bg-transparent text-e1-dark rounded-t-xl"></textarea>
                
                <div class="bg-white border-t-3 border-e1-dark p-3 rounded-b-xl flex justify-between items-center">
                    <div class="text-xs font-bold text-slate-400 pl-2">
                        Read-only output
                    </div>
                    <button id="copyBtn" onclick="copyOutput()" disabled class="btn-neo bg-e1-green text-e1-dark border-3 border-e1-dark px-4 py-2 rounded-xl font-headings font-bold flex items-center gap-2 shadow-[2px_2px_0px_0px_rgba(30,41,59,1)]">
                        <i data-lucide="copy" class="w-4 h-4"></i> Copy
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();

        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const outputState = document.getElementById('outputState');

        // Live Counter Elements
        const countLines = document.getElementById('inputLines');
        const countWords = document.getElementById('inputWords');
        const countChars = document.getElementById('inputChars');

        // Update Stats on Input
        inputEl.addEventListener('input', () => {
            const text = inputEl.value;
            
            // Chars
            countChars.textContent = `${text.length} Chars`;
            
            // Words
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            countWords.textContent = `${words} Words`;
            
            // Lines
            const lines = text ? text.split(/\n/).length : 0;
            countLines.textContent = `${lines} Lines`;
        });

        // Toggle Copy Button State
        function toggleOutputState(hasContent, type) {
            if (hasContent) {
                copyBtn.disabled = false;
                outputState.textContent = `Converted to ${type}`;
                outputState.classList.replace('text-slate-400', 'text-e1-green');
                outputState.classList.remove('italic');
            } else {
                copyBtn.disabled = true;
                outputState.textContent = 'Waiting for action...';
                outputState.classList.replace('text-e1-green', 'text-slate-400');
                outputState.classList.add('italic');
            }
        }

        function process(action) {
            const rawText = inputEl.value.trim();
            if (!rawText) {
                // Subtle shake animation if empty
                inputEl.parentElement.classList.add('animate-pulse');
                setTimeout(() => inputEl.parentElement.classList.remove('animate-pulse'), 500);
                return;
            }

            let result = '';
            let formatType = '';

            // Handle Paragraph to CSV (2D split: lines and commas)
            if (action === 'paragraphToCsv') {
                // Split input by period or semicolon
                const sentences = rawText.split(/[.;]/);
                
                const csvLines = sentences.map(sentence => {
                    // Remove basic punctuation inside the sentence
                    const cleanSentence = sentence.replace(/[,/#!$%\^&\*:{}=\-_`~()\"\'\?]/g, "");
                    // Split into words, remove empty items, and join with commas
                    const words = cleanSentence.trim().split(/\s+/).filter(w => w !== '');
                    return words.join(', ');
                }).filter(line => line !== ''); // Remove empty lines generated by trailing periods
                
                result = csvLines.join('\n');
                formatType = 'CSV Lines';
                
                outputEl.value = result;
                toggleOutputState(true, formatType);
                return; // Early return since this has unique logic
            }

            // Standard Processing for other 1D list actions
            let items = [];
            if (action === 'linesToComma') {
                items = rawText.split(/\n/);
            } else {
                items = rawText.split(',');
            }

            // Clean up array
            items = items.map(item => item.trim()).filter(item => item !== '');

            if (action === 'linesToComma') {
                result = items.join(', ');
                formatType = 'CSV';
            } 
            else if (action === 'commaToLines') {
                result = items.join('\n');
                formatType = 'Lines';
            }
            else if (action === 'commaToList') {
                result = items.map(i => `• ${i}`).join('\n');
                formatType = 'Bullet List';
            } 
            else if (action === 'commaToOrdered') {
                const style = document.getElementById('numOpt').value;
                result = items.map((item, index) => {
                    let marker = '';
                    let n = index + 1;
                    if (style === 'dot') marker = `${n}.`;
                    if (style === 'paren') marker = `${n})`;
                    if (style === 'alpha') marker = `${String.fromCharCode(96 + n)}.`;
                    if (style === 'roman') marker = `${toRoman(n)}.`;
                    return `${marker} ${item}`;
                }).join('\n');
                formatType = 'Numbered List';
            }

            outputEl.value = result;
            toggleOutputState(true, formatType);
        }

        function toRoman(num) {
            const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
            let roman = '';
            for (let i in lookup ) {
                while ( num >= lookup[i] ) {
                    roman += i;
                    num -= lookup[i];
                }
            }
            return roman;
        }

        function clearAll() {
            inputEl.value = '';
            outputEl.value = '';
            inputEl.dispatchEvent(new Event('input')); // Reset counters
            toggleOutputState(false);
            inputEl.focus();
        }

        function copyOutput() {
            if (!outputEl.value) return;
            
            outputEl.select();
            document.execCommand('copy');
            
            // Visual feedback
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Copied!`;
            copyBtn.classList.replace('bg-e1-green', 'bg-e1-blue');
            copyBtn.classList.replace('text-e1-dark', 'text-white');
            lucide.createIcons();
            
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.replace('bg-e1-blue', 'bg-e1-green');
                copyBtn.classList.replace('text-white', 'text-e1-dark');
                lucide.createIcons();
            }, 2000);
        }
    </script>
</body>
</html>
