<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E1 Batam - Character Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        h1, h2, h3, button, .font-title { font-family: 'Fredoka', sans-serif; }
        
        .neo-card {
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            transition: all 0.2s ease;
        }

        .neo-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
        }

        .stat-box {
            border: 3px solid #1e293b;
            border-radius: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background-color: white;
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
        }
    </style>
</head>
<body class="p-4 md:p-8 dark:bg-slate-900">

    <div class="max-w-4xl mx-auto mb-8">
        <h2 class="text-xl font-bold mb-4 text-slate-800 dark:text-white font-title">Select Character:</h2>
        <div id="selector-container" class="flex flex-wrap gap-3">
            </div>
    </div>

    <main id="character-sheet" class="max-w-4xl mx-auto hidden">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <div class="md:col-span-4 space-y-4">
                
                <div onclick="document.getElementById('image-upload').click()" class="cursor-pointer group relative neo-card bg-slate-100 border-4 border-slate-800 rounded-2xl aspect-square flex items-center justify-center overflow-hidden hover:bg-slate-200 transition-colors">
                    <img id="char-img" src="" alt="Character" class="w-full h-full object-cover hidden z-10">
                    <div id="upload-placeholder" class="text-slate-500 flex flex-col items-center z-0">
                        <i data-lucide="image-plus" class="w-12 h-12 mb-2 text-[#2979FF]"></i>
                        <span class="font-bold font-title text-slate-700">Tap to Add Picture</span>
                    </div>
                </div>
                <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                
                <div class="neo-card bg-white border-4 border-slate-800 rounded-2xl p-6">
                    <span id="char-label" class="text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider font-title"></span>
                    <h1 id="char-name" class="text-3xl font-bold text-slate-800 mt-2 font-title"></h1>
                    
                    <div class="mt-6">
                        <p class="text-sm text-slate-500 font-bold uppercase mb-2">Health Points</p>
                        <div class="flex items-center gap-3 mb-3">
                            <button onclick="updateHP(-1)" class="neo-button neo-card w-12 h-12 bg-[#FF6B95] border-3 border-slate-800 rounded-xl flex items-center justify-center text-white hover:bg-pink-500">
                                <i data-lucide="minus" class="w-6 h-6 stroke-[3]"></i>
                            </button>
                            
                            <div class="flex-1 text-center bg-slate-50 border-3 border-slate-800 rounded-xl py-2 font-title text-2xl text-slate-800">
                                <span id="hp-current"></span> <span class="text-slate-400 text-lg">/ <span id="hp-max"></span></span>
                            </div>
                            
                            <button onclick="updateHP(1)" class="neo-button neo-card w-12 h-12 bg-[#00E676] border-3 border-slate-800 rounded-xl flex items-center justify-center text-white hover:bg-green-500">
                                <i data-lucide="plus" class="w-6 h-6 stroke-[3]"></i>
                            </button>
                        </div>

                        <div class="w-full bg-slate-200 rounded-full h-4 border-2 border-slate-800 overflow-hidden">
                            <div id="hp-bar" class="bg-[#00E676] h-full w-full transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 space-y-4">
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="neo-card bg-white border-4 border-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="shield" class="w-6 h-6 text-[#2979FF] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase">Armor Class</span>
                        <span id="char-ac" class="text-2xl font-bold font-title text-slate-800"></span>
                    </div>
                    <div class="neo-card bg-white border-4 border-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="zap" class="w-6 h-6 text-[#FF8C42] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase">Initiative</span>
                        <span id="char-init" class="text-2xl font-bold font-title text-slate-800"></span>
                    </div>
                    <div class="neo-card bg-white border-4 border-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="footprints" class="w-6 h-6 text-[#00E676] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase">Speed</span>
                        <span id="char-speed" class="text-2xl font-bold font-title text-slate-800"></span>
                    </div>
                </div>

                <div class="neo-card bg-white border-4 border-slate-800 rounded-2xl p-6 space-y-6">
                    <div id="stats-grid" class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                        </div>

                    <hr class="border-t-3 border-slate-800">

                    <div>
                        <h3 class="flex items-center gap-2 text-[#2979FF] font-bold text-lg mb-3">
                            <i data-lucide="layout-grid" class="w-6 h-6 stroke-[3]"></i> Resources
                        </h3>
                        <div id="resources-list" class="flex flex-wrap gap-2 mb-4"></div>
                        <button class="neo-button neo-card w-full py-3 bg-slate-800 text-white border-3 border-slate-800 rounded-xl font-bold font-title flex items-center justify-center gap-2 hover:bg-slate-700 transition-colors">
                            <i data-lucide="moon" class="w-5 h-5 stroke-[3]"></i> Take a Long Rest
                        </button>
                    </div>

                    <div>
                        <h3 class="flex items-center gap-2 text-[#FF6B95] font-bold text-lg mb-3">
                            <i data-lucide="sparkles" class="w-6 h-6 stroke-[3]"></i> Features
                        </h3>
                        <ul id="features-list" class="space-y-2 text-slate-700 font-medium bg-slate-50 border-3 border-slate-800 p-4 rounded-xl"></ul>
                    </div>

                    <div>
                        <h3 class="flex items-center gap-2 text-[#FF8C42] font-bold text-lg mb-3">
                            <i data-lucide="sword" class="w-6 h-6 stroke-[3]"></i> Combat Actions
                        </h3>
                        <div id="actions-list" class="bg-slate-50 border-3 border-slate-800 rounded-xl p-4 text-slate-700 font-medium"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentCharIndex = 0;

        // Expanded Character Data with Vitals and HP Tracking
        const characters = [
            {
                name: "TRUMPhet", class: "Fighter", level: 3, color: "#FF8C42", customImg: null,
                vitals: { ac: 16, init: "+1", speed: "30ft", hp: 28, maxHp: 28 },
                stats: { STR: [16, "+3"], DEX: [12, "+1"], CON: [14, "+2"], INT: [8, "-1"], WIS: [10, "+0"], CHA: [13, "+1"] },
                resources: ["Action Surge [ ]", "Second Wind [ ]"],
                features: ["Fighting Style: Protection", "Second Wind (Heal 1d10+3)"],
                actions: "<strong>Greatsword:</strong> +5 to hit, 2d6+3 slashing.<br><br><strong>Reaction:</strong> Impose disadvantage on an enemy attacking an ally next to you."
            },
            {
                name: "Knowledge", class: "Sorcerer", level: 3, color: "#2979FF", customImg: null,
                vitals: { ac: 12, init: "+2", speed: "30ft", hp: 20, maxHp: 20 },
                stats: { STR: [8, "-1"], DEX: [14, "+2"], CON: [13, "+1"], INT: [10, "+0"], WIS: [12, "+1"], CHA: [16, "+3"] },
                resources: ["Sorcery Points [ ] [ ] [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Metamagic: Twinned Spell", "Metamagic: Quickened Spell"],
                actions: "<strong>Mind Sliver:</strong> DC 13 Int Save. 1d6 psychic damage + target subtracts 1d4 from next save.<br><br><strong>Magic Missile:</strong> 3 darts, 1d4+1 force damage each (always hits)."
            },
            {
                name: "Vanilla", class: "Sorcerer", level: 3, color: "#FF6B95", customImg: null,
                vitals: { ac: 12, init: "+2", speed: "30ft", hp: 20, maxHp: 20 },
                stats: { STR: [8, "-1"], DEX: [14, "+2"], CON: [12, "+1"], INT: [10, "+0"], WIS: [13, "+1"], CHA: [16, "+3"] },
                resources: ["Sorcery Points [ ] [ ] [ ]", "Tides of Chaos [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Wild Magic Surge", "Tides of Chaos (Gain Advantage)"],
                actions: "<strong>Fire Bolt:</strong> +5 to hit, 1d10 fire damage.<br><br><strong>Shield (Reaction):</strong> Add +5 to your AC until your next turn."
            },
            {
                name: "Alicia putri", class: "Bard", level: 3, color: "#00E676", customImg: null,
                vitals: { ac: 13, init: "+2", speed: "30ft", hp: 21, maxHp: 21 },
                stats: { STR: [8, "-1"], DEX: [14, "+2"], CON: [12, "+1"], INT: [10, "+0"], WIS: [13, "+1"], CHA: [16, "+3"] },
                resources: ["Inspirations (d6) [ ] [ ] [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Jack of All Trades (+1 to non-proficient skills)", "Song of Rest (Extra 1d6 heal on short rest)"],
                actions: "<strong>Vicious Mockery:</strong> DC 13 Wis Save. 1d4 psychic + disadvantage on next attack.<br><br><strong>Healing Word:</strong> Heal 1d4+3 (Bonus Action)."
            },
            {
                name: "Maltoves", class: "Druid", level: 3, color: "#FF8C42", customImg: null,
                vitals: { ac: 14, init: "+1", speed: "30ft", hp: 24, maxHp: 24 },
                stats: { STR: [10, "+0"], DEX: [12, "+1"], CON: [14, "+2"], INT: [13, "+1"], WIS: [16, "+3"], CHA: [8, "-1"] },
                resources: ["Wild Shapes [ ] [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Combat Wild Shape (Transform as Bonus Action)", "Circle of the Moon"],
                actions: "<strong>Shillelagh:</strong> +5 to hit, 1d8+3 magic bludgeoning.<br><br><strong>Entangle:</strong> DC 13 Str Save. 20ft square of restrained weeds."
            }
        ];

        function renderCharacter(index) {
            currentCharIndex = index;
            const char = characters[index];
            const sheet = document.getElementById('character-sheet');
            sheet.classList.remove('hidden');

            // Header Info
            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-label').innerText = `LV ${char.level} ${char.class}`;
            document.getElementById('char-label').style.backgroundColor = char.color;
            
            // Image Logic
            const imgEl = document.getElementById('char-img');
            const placeholder = document.getElementById('upload-placeholder');
            if (char.customImg) {
                imgEl.src = char.customImg;
                imgEl.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            // Vitals & HP
            document.getElementById('char-ac').innerText = char.vitals.ac;
            document.getElementById('char-init').innerText = char.vitals.init;
            document.getElementById('char-speed').innerText = char.vitals.speed;
            updateHPDisplay();

            // Render Stats
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';
            for (const [key, val] of Object.entries(char.stats)) {
                statsGrid.innerHTML += `
                    <div class="stat-box transition-transform hover:-translate-y-1">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${key}</p>
                        <p class="text-xl font-bold font-title text-slate-800">${val[0]}</p>
                        <p class="text-sm font-bold text-[#2979FF]">${val[1]}</p>
                    </div>
                `;
            }

            // Resources
            document.getElementById('resources-list').innerHTML = char.resources.map(r => 
                `<span class="border-3 border-slate-300 bg-white px-3 py-1 rounded-xl text-sm text-slate-700 font-bold">${r}</span>`
            ).join('');

            // Features
            document.getElementById('features-list').innerHTML = char.features.map(f => 
                `<li class="flex items-start gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-[#00E676] shrink-0 mt-0.5"></i> <span>${f}</span></li>`
            ).join('');

            // Actions
            document.getElementById('actions-list').innerHTML = char.actions;
            
            lucide.createIcons();
        }

        function updateHP(amount) {
            const char = characters[currentCharIndex];
            char.vitals.hp += amount;
            if (char.vitals.hp > char.vitals.maxHp) char.vitals.hp = char.vitals.maxHp;
            if (char.vitals.hp < 0) char.vitals.hp = 0;
            updateHPDisplay();
        }

        function updateHPDisplay() {
            const char = characters[currentCharIndex];
            document.getElementById('hp-current').innerText = char.vitals.hp;
            document.getElementById('hp-max').innerText = char.vitals.maxHp;
            
            const hpPercentage = (char.vitals.hp / char.vitals.maxHp) * 100;
            const hpBar = document.getElementById('hp-bar');
            hpBar.style.width = `${hpPercentage}%`;

            // Change color based on health status
            if (hpPercentage > 50) {
                hpBar.className = "h-full w-full transition-all duration-300 bg-[#00E676]";
            } else if (hpPercentage > 20) {
                hpBar.className = "h-full w-full transition-all duration-300 bg-[#FF8C42]";
            } else {
                hpBar.className = "h-full w-full transition-all duration-300 bg-[#FF6B95]";
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                characters[currentCharIndex].customImg = url;
                renderCharacter(currentCharIndex); // Re-render to show image
            }
        }

        // Initialize Selector
        const selector = document.getElementById('selector-container');
        characters.forEach((char, i) => {
            const btn = document.createElement('button');
            btn.className = "neo-button neo-card px-5 py-2 bg-white border-3 border-slate-800 rounded-xl font-bold font-title text-slate-700 hover:bg-slate-50 transition-colors";
            btn.innerText = char.name;
            btn.onclick = () => renderCharacter(i);
            selector.appendChild(btn);
        });

        // Default to first character
        renderCharacter(0);
        lucide.createIcons();
    </script>
</body>
</html>
