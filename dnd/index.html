<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E1 Batam - Character Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    borderWidth: {
                        '3': '3px',
                    },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        h1,
        h2,
        h3,
        button,
        .font-title {
            font-family: 'Fredoka', sans-serif;
        }

        .neo-card {
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            transition: all 0.2s ease;
        }

        .dark .neo-card {
            box-shadow: 4px 4px 0px 0px rgba(255, 255, 255, 0.2);
        }

        .neo-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
        }

        .dark .neo-button:active {
            box-shadow: 2px 2px 0px 0px rgba(255, 255, 255, 0.2);
        }

        .stat-box {
            border: 3px solid #1e293b;
            border-radius: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background-color: white;
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
        }

        .dark .stat-box {
            border-color: #475569;
            background-color: #1e293b;
            box-shadow: 2px 2px 0px 0px rgba(255, 255, 255, 0.1);
        }

        .editable-input {
            background: transparent;
            border-bottom: 2px dashed #cbd5e1;
            width: 100%;
            outline: none;
        }

        .dark .editable-input {
            border-bottom-color: #475569;
        }

        .editable-input:focus {
            border-bottom-color: #2979FF;
        }
    </style>
</head>

<body
    class="p-4 md:p-8 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div class="max-w-4xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h2 class="text-xl font-bold mb-2 text-slate-800 dark:text-white font-title">Select Character:</h2>
            <div id="selector-container" class="flex flex-wrap gap-3">
            </div>
        </div>
        <div class="flex gap-2">
            <a href="../index.html"
                class="neo-button neo-card p-3 bg-white dark:bg-slate-800 border-3 border-slate-800 dark:border-slate-600 rounded-xl text-slate-800 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors flex items-center justify-center">
                <i data-lucide="home" class="w-5 h-5"></i>
            </a>
            <button onclick="toggleDarkMode()"
                class="neo-button neo-card p-3 bg-white dark:bg-slate-800 border-3 border-slate-800 dark:border-slate-600 rounded-xl text-slate-800 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <i id="dark-mode-icon" data-lucide="moon"></i>
            </button>
            <button onclick="addCharacter()"
                class="neo-button neo-card px-5 py-2 bg-[#00E676] border-3 border-slate-800 rounded-xl font-bold font-title text-white hover:bg-green-500 transition-colors flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Add New
            </button>
        </div>
    </div>

    <main id="character-sheet" class="max-w-4xl mx-auto hidden">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">

            <div class="md:col-span-4 space-y-4">
                <div onclick="document.getElementById('image-upload').click()"
                    class="cursor-pointer group relative neo-card bg-slate-100 dark:bg-slate-800 border-4 border-slate-800 dark:border-slate-600 rounded-2xl aspect-square flex items-center justify-center overflow-hidden hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <img id="char-img" src="" alt="Character" class="w-full h-full object-cover hidden z-10">
                    <div id="upload-placeholder" class="text-slate-500 flex flex-col items-center z-0 p-4 text-center">
                        <i data-lucide="image-plus" class="w-12 h-12 mb-2 text-[#2979FF]"></i>
                        <span class="font-bold font-title text-slate-700 dark:text-slate-300">Tap to Add Picture</span>
                    </div>
                </div>
                <input type="file" id="image-upload" accept="image/*" class="hidden"
                    onchange="handleImageUpload(event)">

                <div
                    class="neo-card bg-white dark:bg-slate-900 border-4 border-slate-800 dark:border-slate-700 rounded-2xl p-6 relative">
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button id="edit-btn" onclick="isEditMode ? saveChanges() : toggleEditMode()"
                            class="p-2 text-slate-400 hover:text-[#2979FF] transition-colors">
                            <i id="edit-icon" data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                        <button onclick="deleteCharacter()"
                            class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div id="view-header">
                        <span id="char-label"
                            class="text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider font-title"></span>
                        <h1 id="char-name" class="text-3xl font-bold text-slate-800 dark:text-white mt-2 font-title">
                        </h1>
                    </div>

                    <div id="edit-header" class="hidden space-y-3 pt-4">
                        <div class="flex gap-2">
                            <input type="text" id="edit-name"
                                class="editable-input text-2xl font-bold text-slate-800 dark:text-white font-title"
                                placeholder="Name">
                            <input type="number" id="edit-level" class="editable-input w-16 text-center font-bold"
                                placeholder="Lvl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="edit-class" class="editable-input text-sm uppercase font-bold"
                                placeholder="Class">
                            <input type="color" id="edit-color" class="w-8 h-8 rounded cursor-pointer border-none p-0">
                        </div>
                    </div>

                    <div class="mt-8">
                        <p class="text-sm text-slate-500 dark:text-slate-400 font-bold uppercase mb-2">Health Points</p>
                        <div class="flex items-center gap-3 mb-3">
                            <button onclick="updateHP(-1)"
                                class="neo-button neo-card w-12 h-12 bg-[#FF6B95] border-3 border-slate-800 rounded-xl flex items-center justify-center text-white hover:bg-pink-500">
                                <i data-lucide="minus" class="w-6 h-6 stroke-[3]"></i>
                            </button>

                            <div
                                class="flex-1 text-center bg-slate-50 dark:bg-slate-800 border-3 border-slate-800 dark:border-slate-700 rounded-xl py-2 font-title text-2xl text-slate-800 dark:text-white relative">
                                <span id="hp-current"></span>
                                <span class="text-slate-400 text-lg">/
                                    <span id="hp-max-display"></span>
                                    <input type="number" id="edit-max-hp"
                                        class="hidden w-16 bg-transparent text-center border-b-2 border-[#2979FF] outline-none ml-1">
                                </span>
                            </div>

                            <button onclick="updateHP(1)"
                                class="neo-button neo-card w-12 h-12 bg-[#00E676] border-3 border-slate-800 rounded-xl flex items-center justify-center text-white hover:bg-green-500">
                                <i data-lucide="plus" class="w-6 h-6 stroke-[3]"></i>
                            </button>
                        </div>

                        <div
                            class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-4 border-2 border-slate-800 dark:border-slate-700 overflow-hidden">
                            <div id="hp-bar" class="bg-[#00E676] h-full transition-all duration-300"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <div
                        class="neo-card bg-white dark:bg-slate-900 border-4 border-slate-800 dark:border-slate-700 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="shield" class="w-6 h-6 text-[#2979FF] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase text-center">Armor Class</span>
                        <span id="char-ac" class="text-2xl font-bold font-title text-slate-800 dark:text-white"></span>
                        <input type="number" id="edit-ac"
                            class="hidden w-full text-center bg-transparent text-2xl font-bold font-title text-slate-800 dark:text-white border-b-2 border-[#2979FF]">
                    </div>
                    <div
                        class="neo-card bg-white dark:bg-slate-900 border-4 border-slate-800 dark:border-slate-700 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="zap" class="w-6 h-6 text-[#FF8C42] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase text-center">Initiative</span>
                        <span id="char-init"
                            class="text-2xl font-bold font-title text-slate-800 dark:text-white"></span>
                        <input type="text" id="edit-init"
                            class="hidden w-full text-center bg-transparent text-2xl font-bold font-title text-slate-800 dark:text-white border-b-2 border-[#2979FF]">
                    </div>
                    <div
                        class="neo-card bg-white dark:bg-slate-900 border-4 border-slate-800 dark:border-slate-700 rounded-2xl p-4 flex flex-col items-center justify-center">
                        <i data-lucide="footprints" class="w-6 h-6 text-[#00E676] mb-1"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase text-center">Speed</span>
                        <span id="char-speed"
                            class="text-2xl font-bold font-title text-slate-800 dark:text-white"></span>
                        <input type="text" id="edit-speed"
                            class="hidden w-full text-center bg-transparent text-2xl font-bold font-title text-slate-800 dark:text-white border-b-2 border-[#2979FF]">
                    </div>
                </div>

                <div
                    class="neo-card bg-white dark:bg-slate-900 border-4 border-slate-800 dark:border-slate-700 rounded-2xl p-6 space-y-6">
                    <div id="stats-grid" class="grid grid-cols-3 sm:grid-cols-6 gap-2"></div>

                    <hr class="border-t-3 border-slate-800 dark:border-slate-700">

                    <div class="space-y-4">
                        <div>
                            <h3 class="flex items-center gap-2 text-[#2979FF] font-bold text-lg mb-3">
                                <i data-lucide="layout-grid" class="w-6 h-6 stroke-[3]"></i> Resources
                            </h3>
                            <div id="view-resources" class="flex flex-wrap gap-2"></div>
                            <textarea id="edit-resources"
                                class="hidden w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-300 dark:border-slate-700 p-3 rounded-xl min-h-[80px] text-slate-800 dark:text-white text-sm"
                                placeholder="Comma separated resources..."></textarea>

                            <button onclick="takeLongRest()"
                                class="neo-button neo-card w-full py-3 bg-slate-800 dark:bg-slate-700 text-white border-3 border-slate-800 rounded-xl font-bold font-title flex items-center justify-center gap-2 hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors mt-4">
                                <i data-lucide="moon" class="w-5 h-5 stroke-[3]"></i> Take a Long Rest
                            </button>
                        </div>

                        <div>
                            <h3 class="flex items-center gap-2 text-[#FF6B95] font-bold text-lg mb-3">
                                <i data-lucide="sparkles" class="w-6 h-6 stroke-[3]"></i> Features
                            </h3>
                            <div id="view-features"
                                class="space-y-2 text-slate-700 dark:text-slate-300 font-medium bg-slate-50 dark:bg-slate-800 border-3 border-slate-800 dark:border-slate-700 p-4 rounded-xl">
                            </div>
                            <textarea id="edit-features"
                                class="hidden w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-300 dark:border-slate-700 p-3 rounded-xl min-h-[100px] text-slate-800 dark:text-white text-sm"
                                placeholder="One feature per line..."></textarea>
                        </div>

                        <div>
                            <h3 class="flex items-center gap-2 text-[#FF8C42] font-bold text-lg mb-3">
                                <i data-lucide="sword" class="w-6 h-6 stroke-[3]"></i> Combat Actions
                            </h3>
                            <div id="view-actions"
                                class="bg-slate-50 dark:bg-slate-800 border-3 border-slate-800 dark:border-slate-700 rounded-xl p-4 text-slate-700 dark:text-slate-300 font-medium">
                            </div>
                            <textarea id="edit-actions"
                                class="hidden w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-300 dark:border-slate-700 p-3 rounded-xl min-h-[100px] text-slate-800 dark:text-white text-sm"
                                placeholder="HTML or Plain text for actions..."></textarea>
                        </div>
                    </div>

                    <button id="save-btn" onclick="saveChanges()"
                        class="hidden neo-button neo-card w-full py-4 bg-blue-600 text-white border-3 border-slate-800 rounded-xl font-bold font-title text-xl hover:bg-blue-500 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="save" class="w-6 h-6"></i> SAVE CHARACTER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentCharIndex = 0;
        let isEditMode = false;

        const defaultCharacters = [
            {
                name: "TRUMPhet", class: "Fighter", level: 3, color: "#FF8C42", customImg: null,
                vitals: { ac: 16, init: "+1", speed: "30ft", hp: 28, maxHp: 28 },
                stats: { STR: [16, "+3"], DEX: [12, "+1"], CON: [14, "+2"], INT: [8, "-1"], WIS: [10, "+0"], CHA: [13, "+1"] },
                resources: ["Action Surge [ ]", "Second Wind [ ]"],
                features: ["Fighting Style: Protection", "Second Wind (Heal 1d10+3)"],
                actions: "<strong>Greatsword:</strong> +5 to hit, 2d6+3 slashing.<br><br><strong>Reaction:</strong> Impose disadvantage on an enemy attacking an ally next to you."
            },
            {
                name: "Knowledge", class: "Sorcerer", level: 3, color: "#2979FF", customImg: null,
                vitals: { ac: 12, init: "+2", speed: "30ft", hp: 20, maxHp: 20 },
                stats: { STR: [8, "-1"], DEX: [14, "+2"], CON: [13, "+1"], INT: [10, "+0"], WIS: [12, "+1"], CHA: [16, "+3"] },
                resources: ["Sorcery Points [ ] [ ] [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Metamagic: Twinned Spell", "Metamagic: Quickened Spell"],
                actions: "<strong>Mind Sliver:</strong> DC 13 Int Save. 1d6 psychic damage + target subtracts 1d4 from next save.<br><br><strong>Magic Missile:</strong> 3 darts, 1d4+1 force damage each (always hits)."
            },
            {
                name: "Vanilla", class: "Sorcerer", level: 3, color: "#FF6B95", customImg: null,
                vitals: { ac: 12, init: "+2", speed: "30ft", hp: 20, maxHp: 20 },
                stats: { STR: [8, "-1"], DEX: [14, "+2"], CON: [12, "+1"], INT: [10, "+0"], WIS: [13, "+1"], CHA: [16, "+3"] },
                resources: ["Sorcery Points [ ] [ ] [ ]", "Tides of Chaos [ ]", "L1 Slots [ ][ ][ ][ ]", "L2 Slots [ ][ ]"],
                features: ["Wild Magic Surge", "Tides of Chaos (Gain Advantage)"],
                actions: "<strong>Fire Bolt:</strong> +5 to hit, 1d10 fire damage.<br><br><strong>Shield (Reaction):</strong> Add +5 to your AC until your next turn."
            }
        ];

        let characters = JSON.parse(localStorage.getItem('characters')) || defaultCharacters;

        function saveToStorage() {
            localStorage.setItem('characters', JSON.stringify(characters));
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('dark-mode-icon');
            if (icon) {
                icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
                lucide.createIcons();
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateDarkModeIcon();

        function renderSelector() {
            const selector = document.getElementById('selector-container');
            selector.innerHTML = '';
            characters.forEach((char, i) => {
                const btn = document.createElement('button');
                btn.className = `neo-button neo-card px-5 py-2 border-3 border-slate-800 dark:border-slate-700 rounded-xl font-bold font-title transition-colors ${i === currentCharIndex ? 'bg-slate-800 text-white dark:bg-slate-100 dark:text-slate-900' : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`;
                btn.innerText = char.name;
                btn.onclick = () => {
                    if (isEditMode) {
                        if (!confirm("Discard unsaved changes?")) return;
                        toggleEditMode();
                    }
                    renderCharacter(i);
                };
                selector.appendChild(btn);
            });
        }

        function renderCharacter(index) {
            currentCharIndex = index;
            const char = characters[index];
            const sheet = document.getElementById('character-sheet');
            sheet.classList.remove('hidden');

            renderSelector();

            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-label').innerText = `LV ${char.level} ${char.class}`;
            document.getElementById('char-label').style.backgroundColor = char.color;

            const imgEl = document.getElementById('char-img');
            const placeholder = document.getElementById('upload-placeholder');
            if (char.customImg) {
                imgEl.src = char.customImg;
                imgEl.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            document.getElementById('char-ac').innerText = char.vitals.ac;
            document.getElementById('char-init').innerText = char.vitals.init;
            document.getElementById('char-speed').innerText = char.vitals.speed;
            updateHPDisplay();

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';
            for (const [key, val] of Object.entries(char.stats)) {
                statsGrid.innerHTML += `
                    <div class="stat-box transition-transform hover:-translate-y-1">
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${key}</p>
                        <input type="number" value="${val[0]}" class="edit-stat-input hidden w-full text-center bg-transparent text-xl font-bold font-title text-slate-800 dark:text-white outline-none">
                        <p class="view-stat-val text-xl font-bold font-title text-slate-800 dark:text-white">${val[0]}</p>
                        <p class="text-xs font-bold text-[#2979FF]">${val[1]}</p>
                    </div>
                `;
            }

            document.getElementById('view-resources').innerHTML = char.resources.map(r =>
                `<span class="border-3 border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-1 rounded-xl text-sm text-slate-700 dark:text-slate-300 font-bold">${r}</span>`
            ).join('');

            document.getElementById('view-features').innerHTML = char.features.length ? char.features.map(f =>
                `<div class="flex items-start gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-[#00E676] shrink-0 mt-0.5"></i> <span>${f}</span></div>`
            ).join('') : '<p class="text-slate-400 italic">No features listed</p>';

            document.getElementById('view-actions').innerHTML = char.actions || '<p class="text-slate-400 italic">No actions listed</p>';

            lucide.createIcons();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const char = characters[currentCharIndex];

            const elements = [
                'view-header', 'edit-header', 'save-btn',
                'char-ac', 'edit-ac', 'char-init', 'edit-init',
                'char-speed', 'edit-speed', 'hp-max-display', 'edit-max-hp',
                'view-resources', 'edit-resources', 'view-features', 'edit-features',
                'view-actions', 'edit-actions'
            ];

            elements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('hidden');
            });

            document.querySelectorAll('.view-stat-val').forEach(el => el.classList.toggle('hidden'));
            document.querySelectorAll('.edit-stat-input').forEach(el => el.classList.toggle('hidden'));

            document.getElementById('edit-btn').classList.toggle('text-[#2979FF]');
            const editIcon = document.getElementById('edit-icon');
            if (editIcon) {
                editIcon.setAttribute('data-lucide', isEditMode ? 'check-circle' : 'edit-3');
                lucide.createIcons();
            }

            if (isEditMode) {
                document.getElementById('edit-name').value = char.name;
                document.getElementById('edit-level').value = char.level;
                document.getElementById('edit-class').value = char.class;
                document.getElementById('edit-color').value = char.color || '#1e293b';
                document.getElementById('edit-ac').value = char.vitals.ac;
                document.getElementById('edit-init').value = char.vitals.init;
                document.getElementById('edit-speed').value = char.vitals.speed;
                document.getElementById('edit-max-hp').value = char.vitals.maxHp;

                document.getElementById('edit-resources').value = char.resources.join(', ');
                document.getElementById('edit-features').value = char.features.join('\n');
                document.getElementById('edit-actions').value = char.actions;
            }
        }

        function saveChanges() {
            const char = characters[currentCharIndex];
            char.name = document.getElementById('edit-name').value;
            char.level = parseInt(document.getElementById('edit-level').value);
            char.class = document.getElementById('edit-class').value;
            char.color = document.getElementById('edit-color').value;
            char.vitals.ac = parseInt(document.getElementById('edit-ac').value);
            char.vitals.init = document.getElementById('edit-init').value;
            char.vitals.speed = document.getElementById('edit-speed').value;
            char.vitals.maxHp = parseInt(document.getElementById('edit-max-hp').value);

            if (char.vitals.hp > char.vitals.maxHp) char.vitals.hp = char.vitals.maxHp;

            char.resources = document.getElementById('edit-resources').value.split(',').map(s => s.trim()).filter(s => s !== '');
            char.features = document.getElementById('edit-features').value.split('\n').map(s => s.trim()).filter(s => s !== '');
            char.actions = document.getElementById('edit-actions').value;

            document.querySelectorAll('.edit-stat-input').forEach((input, i) => {
                const statKeys = Object.keys(char.stats);
                const key = statKeys[i];
                const score = parseInt(input.value);
                const mod = Math.floor((score - 10) / 2);
                const modStr = mod >= 0 ? `+${mod}` : mod.toString();
                char.stats[key] = [score, modStr];
            });

            saveToStorage();
            toggleEditMode();
            renderCharacter(currentCharIndex);
        }

        function addCharacter() {
            const newChar = {
                name: "New Hero", class: "Adventurer", level: 1, color: "#1e293b", customImg: null,
                vitals: { ac: 10, init: "+0", speed: "30ft", hp: 10, maxHp: 10 },
                stats: { STR: [10, "+0"], DEX: [10, "+0"], CON: [10, "+0"], INT: [10, "+0"], WIS: [10, "+0"], CHA: [10, "+0"] },
                resources: [], features: [], actions: "Add actions here..."
            };
            characters.push(newChar);
            currentCharIndex = characters.length - 1;
            saveToStorage();
            if (isEditMode) toggleEditMode();
            renderCharacter(currentCharIndex);
            toggleEditMode();
        }

        function deleteCharacter() {
            if (characters.length <= 1) {
                alert("Cannot delete the last character!");
                return;
            }
            if (confirm(`Delete ${characters[currentCharIndex].name}?`)) {
                characters.splice(currentCharIndex, 1);
                currentCharIndex = Math.max(0, currentCharIndex - 1);
                saveToStorage();
                if (isEditMode) isEditMode = false;
                renderCharacter(currentCharIndex);
            }
        }

        function updateHP(amount) {
            const char = characters[currentCharIndex];
            char.vitals.hp += amount;
            if (char.vitals.hp > char.vitals.maxHp) char.vitals.hp = char.vitals.maxHp;
            if (char.vitals.hp < 0) char.vitals.hp = 0;
            saveToStorage();
            updateHPDisplay();
        }

        function updateHPDisplay() {
            const char = characters[currentCharIndex];
            document.getElementById('hp-current').innerText = char.vitals.hp;
            document.getElementById('hp-max-display').innerText = char.vitals.maxHp;

            const hpPercentage = (char.vitals.hp / char.vitals.maxHp) * 100;
            const hpBar = document.getElementById('hp-bar');
            hpBar.style.width = `${hpPercentage}%`;

            if (hpPercentage > 50) {
                hpBar.className = "h-full transition-all duration-300 bg-[#00E676]";
            } else if (hpPercentage > 20) {
                hpBar.className = "h-full transition-all duration-300 bg-[#FF8C42]";
            } else {
                hpBar.className = "h-full transition-all duration-300 bg-[#FF6B95]";
            }
        }

        function takeLongRest() {
            const char = characters[currentCharIndex];
            char.vitals.hp = char.vitals.maxHp;
            saveToStorage();
            updateHPDisplay();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    characters[currentCharIndex].customImg = e.target.result;
                    saveToStorage();
                    renderCharacter(currentCharIndex);
                };
                reader.readAsDataURL(file);
            }
        }

        renderCharacter(currentCharIndex);
    </script>
</body>

</html>
